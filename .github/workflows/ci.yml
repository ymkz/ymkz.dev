name: ci

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

env:
  CI: true
  TZ: Asia/Tokyo
  DO_NOT_TRACK: 1

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1
      - run: pnpm --version
      - run: node --version
      - run: pnpm run lint
      - run: pnpm run analyze
